name: Defence Digest Daily Email

on:
  schedule:
    - cron: '25 6 * * *'    # 11:55 AM IST = 06:25 UTC
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Defence Digest
        env:
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python defence_digest_free.py
