name: Defence Digest Daily Email

on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Defence Digest
        env:
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: python defence_digest_free.py
